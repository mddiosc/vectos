name: Experimental Release

# Triggered when a version tag is pushed (e.g. v0.1.0).
# Produces experimental/internal GitHub release assets for darwin/arm64 and linux/amd64.
# Each platform builds natively on its own runner to avoid CGO cross-compilation complexity.

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14        # Apple Silicon (arm64)
            os: darwin
            arch: arm64
            cc: clang
          - runner: ubuntu-latest   # x86_64
            os: linux
            arch: amd64
            cc: gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION="${{ github.ref_name }}"
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          LDFLAGS="-s -w \
            -X vectos/internal/buildinfo.Version=${VERSION} \
            -X vectos/internal/buildinfo.Commit=${COMMIT} \
            -X vectos/internal/buildinfo.Date=${DATE}"
          go build -ldflags "${LDFLAGS}" -o vectos ./cmd/vectos

      - name: Package archive
        id: package
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE="vectos_${VERSION}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz"
          tar -czf "${ARCHIVE}" vectos LICENSE README.md CHANGELOG.md
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: vectos-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ steps.package.outputs.archive }}
          retention-days: 1

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist/
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }} (experimental)"
          body: |
            > ⚠️ **Experimental/internal build** — not a stable public release.
            > Interfaces, packaging, and behavior may change without notice.
            > Supported platforms: `darwin/arm64` and `linux/amd64` only.

            **First run note**: the embedded provider downloads ONNX Runtime and model
            assets from the internet into `~/.vectos/models/` on first use.

            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
