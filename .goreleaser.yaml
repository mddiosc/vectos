version: 2

project_name: vectos

builds:
  - id: vectos
    main: ./cmd/vectos
    binary: vectos
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    builds:
      - vectos
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md

checksum:
  name_template: checksums.txt

release:
  disable: true

brews:
  - name: vectos
    ids:
      - vectos
    directory: packaging/homebrew
    homepage: "https://github.com/mddiosc/vectos"
    description: "Local-first code context engine for AI agents"
    license: "Apache-2.0"
    install: |
      bin.install "vectos"
    test: |
      system "#{bin}/vectos"
