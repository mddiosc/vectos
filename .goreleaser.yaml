version: 2

# Local dry-run reference for Vectos.
# NOTE: The CI release pipeline (.github/workflows/release.yaml) uses native
# runners per platform instead of cross-compilation to avoid CGO/osxcross complexity.
# This file is kept for local `make release-dry-run` usage only.

project_name: vectos

before:
  hooks:
    - go mod tidy

builds:
  - id: vectos
    main: ./cmd/vectos
    binary: vectos
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
      - -X vectos/internal/buildinfo.Version={{.Version}}
      - -X vectos/internal/buildinfo.Commit={{.ShortCommit}}
      - -X vectos/internal/buildinfo.Date={{.Date}}
    # Local dry-run builds only for the host platform.
    goos:
      - darwin
    goarch:
      - arm64

archives:
  - id: vectos
    name_template: "vectos_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256
